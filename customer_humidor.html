<!DOCTYPE html>
<html>
<head>
    <title>Customer Humidor | The Tobacco Center</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&Josefin+Sans:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c9a84c; --jungle: #001b16; --forest: #033d33; }
        body { font-family: 'Josefin Sans', sans-serif; background: var(--jungle); color: #eee; padding: 20px; text-align: center; }
        h2 { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 2.5rem; margin-top: 40px; }
        
        input { padding: 15px; font-size: 18px; width: 100%; max-width: 320px; border-radius: 50px; border: 1px solid var(--gold); background: #052621; color: white; text-align: center; outline: none; }
        button { padding: 15px; border-radius: 50px; border: none; background: var(--gold); color: var(--jungle); font-weight: bold; cursor: pointer; margin-top: 15px; width: 100%; max-width: 320px; }
        
        #results { max-width: 650px; margin: 40px auto; text-align: left; }
        
        /* 🛑 GRID-LOCK: PREVENTS SHAKING */
        .item { 
            background: var(--forest); padding: 20px; border-radius: 12px; margin-bottom: 15px; border-left: 5px solid var(--gold); 
            display: grid; grid-template-columns: 85px 1fr; gap: 20px; align-items: center; min-height: 120px;
        }
        .img-box { width: 85px; height: 85px; background: white; border-radius: 8px; overflow: hidden; flex-shrink: 0; }
        .img-box img { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body>
    <h2>Customer Humidor</h2>
    <p>Enter your phone number to see your purchase history.</p>
    <input id="phone" type="tel" placeholder="(XXX) XXX-XXXX" /> <br>
    <button onclick="lookup()">Enter Vault</button>
    <div id="results"></div>

    <script>
        document.getElementById("phone").addEventListener("input", e => {
            let x = e.target.value.replace(/\D/g, "").slice(0, 10);
            e.target.value = x.length > 6 ? `(${x.slice(0,3)}) ${x.slice(3,6)}-${x.slice(6)}` : x.length > 3 ? `(${x.slice(0,3)}) ${x.slice(3)}` : x;
        });

        async function lookup() {
            const phone = document.getElementById("phone").value.replace(/\D/g, "").slice(-10);
            const container = document.getElementById("results");
            container.innerHTML = "<p style='text-align:center; color:var(--gold)'>Searching Vault...</p>";
            
            const res = await fetch("https://ttc-inv-api.williamsportcigars.workers.dev/customer-lookup", {
                method: "POST",
                body: JSON.stringify({ phone })
            });
            const data = await res.json();
            
            container.innerHTML = data.items.length ? "" : "<p style='text-align:center'>No history found.</p>";
            data.items.forEach(item => {
                container.innerHTML += `
                    <div class="item">
                        <div class="img-box"><img src="${item.meta?.image || 'https://thetobaccocenter.com/logo-placeholder.png'}"></div>
                        <div>
                            <div style="font-family:'Playfair Display'; color:var(--gold); font-size:1.2rem; font-weight:bold;">${item.name}</div>
                            <div style="font-size:0.8rem; color:#259f8a">Purchased: ${item.date}</div>
                            <div style="font-size:0.9rem; margin-top:5px; color:#ccc;">${item.meta?.profile || item.note || ""}</div>
                        </div>
                    </div>`;
            });
        }
    </script>
</body>
</html>
