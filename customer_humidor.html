<!DOCTYPE html>
<html>
<head>
    <title>My Humidor | The Tobacco Center</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Josefin+Sans:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { --jungle: #001b16; --forest: #033d33; --gold: #c9a84c; --white: #eee; --mint: #259f8a; }
        body { font-family: 'Josefin Sans', sans-serif; background: var(--jungle); color: var(--white); padding: 20px; text-align: center; }
        h2 { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 2.5rem; margin-top: 40px; }
        input { padding: 15px; font-size: 18px; width: 100%; max-width: 320px; border-radius: 50px; border: 1px solid var(--gold); background: #052621; color: white; text-align: center; outline: none; box-sizing: border-box; }
        button { padding: 15px; border-radius: 50px; border: none; background: var(--gold); color: var(--jungle); font-weight: bold; cursor: pointer; margin-top: 15px; width: 100%; max-width: 320px; transition: 0.3s; }
        #results { max-width: 650px; margin: 40px auto; text-align: left; }
        .item { background: var(--forest); padding: 20px; border-radius: 12px; margin-bottom: 15px; border-left: 5px solid var(--gold); display: flex; gap: 20px; align-items: center; }
        .item img { width: 90px; height: 90px; object-fit: contain; background: white; border-radius: 8px; }
    </style>
</head>
<body>
    <h2>My Humidor</h2>
    <input id="phone" type="tel" placeholder="(XXX) XXX-XXXX" /> <br>
    <button onclick="lookup()">Enter Vault</button>
    <div id="results"></div>
    <script>
        const API_URL = "https://ttc-inv-api.williamsportcigars.workers.dev/customer-lookup";
        document.getElementById("phone").addEventListener("input", e => {
            let x = e.target.value.replace(/\D/g, "").slice(0, 10);
            e.target.value = x.length > 6 ? `(${x.slice(0,3)}) ${x.slice(3,6)}-${x.slice(6)}` : x.length > 3 ? `(${x.slice(0,3)}) ${x.slice(3)}` : x;
        });
        async function lookup() {
            const phone = document.getElementById("phone").value.replace(/\D/g, "").slice(-10);
            const container = document.getElementById("results");
            container.innerHTML = "Opening vault...";
            try {
                const res = await fetch(API_URL, { method: "POST", body: JSON.stringify({ phone }) });
                const data = await res.json();
                container.innerHTML = data.items.length ? "" : "No smokes found for this number.";
                data.items.forEach(item => {
                    container.innerHTML += `
                        <div class="item">
                            <img src="${item.meta?.image || 'https://thetobaccocenter.com/logo-placeholder.png'}">
                            <div>
                                <div style="font-family:'Playfair Display'; color:var(--gold); font-size:1.3rem;">${item.name}</div>
                                <div style="font-size:0.8rem; color:var(--mint)">Last Smoked: ${item.date}</div>
                                <div style="font-size:0.9rem; margin-top:8px; font-style:italic;">${item.meta?.profile || ""}</div>
                            </div>
                        </div>`;
                });
            } catch (e) { container.innerHTML = "Connection error."; }
        }
    </script>
</body>
</html>
