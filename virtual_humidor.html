<!DOCTYPE html>
<html>
<head>
    <title>Virtual Humidor | The Tobacco Center</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&Josefin+Sans:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c9a84c; --jungle: #001b16; --forest: #033d33; }
        body { font-family: 'Josefin Sans', sans-serif; background: var(--jungle); color: #eee; padding: 20px; text-align: center; }
        h2 { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 2.8rem; margin: 40px 0 10px; }
        #inventory { max-width: 800px; margin: 40px auto; display: grid; gap: 20px; }
        
        /* 🛑 GRID-LOCK: PREVENTS SHAKING */
        .item { 
            background: var(--forest); border-radius: 12px; border-left: 5px solid var(--gold); 
            display: grid; grid-template-columns: 100px 1fr; gap: 20px; 
            padding: 20px; text-align: left; align-items: center; min-height: 140px; 
        }
        .img-box { width: 100px; height: 100px; background: white; border-radius: 8px; overflow: hidden; flex-shrink: 0; }
        .img-box img { width: 100%; height: 100%; object-fit: contain; }
        
        .strength { display: inline-block; padding: 4px 10px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; margin-bottom: 8px; }
        .Mild { background: #f1c40f; color: #000; } .Medium { background: #e67e22; color: #fff; } .Full { background: #c0392b; color: #fff; } .Flavored { background: #9b59b6; color: #fff; }
    </style>
</head>
<body>
    <h2>Virtual Humidor</h2>
    <div id="inventory">Loading Inventory...</div>

    <script>
        async function load() {
            const res = await fetch("https://ttc-inv-api.williamsportcigars.workers.dev/");
            const items = await res.json();
            const container = document.getElementById("inventory");
            container.innerHTML = "";

            items.forEach(i => {
                const details = i.details || {};
                container.innerHTML += `
                    <div class="item">
                        <div class="img-box"><img src="${details.image || 'https://thetobaccocenter.com/logo-placeholder.png'}"></div>
                        <div>
                            <span class="strength ${details.strength || 'Medium'}">${details.strength || 'Medium'}</span>
                            <div style="font-family:'Playfair Display'; color:var(--gold); font-size:1.4rem; font-weight:bold;">${i.name}</div>
                            <div style="font-size:0.9rem; color:#ccc; margin-top:5px;">${details.vitola || ''} ${details.wrapper ? '• ' + details.wrapper : ''}</div>
                            <div style="font-size:0.9rem; margin-top:8px; line-height:1.4;">${details.profile || ''}</div>
                        </div>
                    </div>`;
            });
        }
        load();
    </script>
</body>
</html>
