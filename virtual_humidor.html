<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Humidor | The Tobacco Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
          --black: #001b16; --dark: #001b16; --forest: #033d33; --jungle: #022e27;
          --teal: #0d6354; --teal-light: #259f8a; --mint: #259f8a; --mint-pale: #e0fef8;
          --gold: #c9a84c; --gold-light: #e8c76a;
          --cream: #f0fdf8; --warm-white: #f7fffe;
          --text: #001b16; --text-muted: #0d4a3a; --border: #9dd4c8;
          --font-display: 'Playfair Display', Georgia, serif;
          --font-body: 'Libre Baskerville', Georgia, serif;
          --font-sans: 'Josefin Sans', sans-serif;
        }

        body { font-family: var(--font-body); background: var(--warm-white); color: var(--text); line-height: 1.7; }

        /* NAV */
        .site-nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: var(--black); border-bottom: 1px solid rgba(77,191,138,0.2); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 64px; }
        .nav-logo { font-family: var(--font-display); color: var(--mint); font-size: 15px; letter-spacing: 0.06em; text-decoration: none; font-weight: 700; text-transform: uppercase; }
        .nav-logo span { font-style: italic; font-weight: 400; color: rgba(168,230,200,0.55); font-size: 11px; display: block; letter-spacing: 0.12em; }

        /* HERO AREA */
        .inv-hero { background: var(--black); padding: 120px 4rem 60px; position: relative; overflow: hidden; text-align: left; }
        .inv-hero h1 { font-family: var(--font-display); font-size: clamp(3rem,6vw,5.5rem); font-weight: 900; line-height: 1.05; color: var(--warm-white); margin-bottom: 1.5rem; }
        .inv-hero h1 em { color: var(--mint); font-style: italic; }
        .eyebrow { font-family: var(--font-sans); font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--mint); display: block; margin-bottom: 1rem; }

        /* FILTER DROPDOWN - FIXED WHITE ON WHITE */
        .filter-wrap { background: var(--forest); padding: 2rem 4rem; border-top: 1px solid rgba(77,191,138,0.12); display: flex; align-items: center; gap: 20px; }
        .filter-wrap label { font-family: var(--font-sans); font-size: 10px; color: var(--mint-pale); text-transform: uppercase; letter-spacing: 0.1em; }
        
        select { 
            background: white !important; /* Force white background */
            color: black !important;      /* Force black text */
            border: 2px solid var(--mint); 
            padding: 10px 20px; 
            font-family: var(--font-sans); 
            text-transform: uppercase; 
            font-size: 12px; 
            font-weight: 600;
            outline: none; 
            cursor: pointer;
            border-radius: 4px;
            appearance: auto; /* Uses standard browser arrow for better compatibility */
        }
        select option {
            background: white;
            color: black;
        }

        /* INVENTORY GRID */
        .inventory-section { padding: 5rem 4rem; background: var(--cream); }
        #inventory-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 2rem; max-width: 1400px; margin: 0 auto; }
        
        .cigar-card { 
            background: var(--warm-white); 
            border: 1px solid var(--border); 
            padding: 2rem; 
            display: grid; 
            grid-template-columns: 120px 1fr; 
            gap: 20px;
            align-items: start;
            min-height: 180px;
            position: relative;
        }
        .cigar-card::before { content: ''; display: block; width: 28px; height: 2px; background: var(--mint); position: absolute; top: 1.5rem; left: 2rem; }

        .img-box { width: 120px; height: 120px; background: #fff; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid #eee; flex-shrink: 0; }
        .img-box img { width: 100%; height: 100%; object-fit: contain; }

        .cigar-card h3 { font-family: var(--font-display); font-size: 1.25rem; font-weight: 700; color: var(--black); margin-bottom: 0.5rem; margin-top: 1rem; line-height: 1.3; }
        .cigar-meta { font-family: var(--font-sans); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--teal); margin-bottom: 0.75rem; }
        .cigar-card p { font-size: 0.875rem; color: var(--text-muted); line-height: 1.8; }

        .status-msg { font-family: var(--font-display); font-style: italic; color: var(--teal); text-align: center; grid-column: 1/-1; padding: 4rem; }

        /* FOOTER */
        .site-footer { background: var(--black); border-top: 1px solid rgba(77,191,138,0.1); padding: 2rem 4rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; }
        .footer-copy { font-family: var(--font-sans); font-size: 10px; letter-spacing: 0.08em; color: rgba(253,252,248,0.25); }

        @media (max-width: 768px) {
            .inventory-section, .inv-hero, .filter-wrap { padding: 3rem 1.5rem; }
            .cigar-card { grid-template-columns: 1fr; text-align: center; }
            .img-box { margin: 0 auto; }
            .cigar-card::before { left: 50%; transform: translateX(-50%); }
            .filter-wrap { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>

<nav class="site-nav">
    <a href="index.html" class="nav-logo">The Tobacco Center <span>tabacarius qui curat</span></a>
</nav>

<section class="inv-hero">
    <span class="eyebrow">Inventory Catalog</span>
    <h1>The Virtual <em>Humidor.</em></h1>
</section>

<div class="filter-wrap">
    <label>Filter By Strength:</label>
    <select id="strengthFilter" onchange="applyFilter()">
        <option value="All">All Selections</option>
        <option value="Mild">Mild</option>
        <option value="Medium">Medium</option>
        <option value="Full">Full</option>
        <option value="Flavored">Flavored</option>
    </select>
</div>

<section class="inventory-section">
    <div id="inventory-grid">
        <div class="status-msg">Opening the humidor doors...</div>
    </div>
</section>

<footer class="site-footer">
    <div class="footer-copy">© 2026 The Tobacco Center LLC · 21 W Church St, Williamsport, PA</div>
</footer>

<script>
    let fullInventory = [];
    async function loadInventory() {
        const grid = document.getElementById("inventory-grid");
        try {
            const res = await fetch("https://ttc-inv-api.williamsportcigars.workers.dev/");
            fullInventory = await res.json();
            renderInventory(fullInventory);
        } catch (e) {
            grid.innerHTML = `<div class="status-msg">Vault offline. Please refresh the page.</div>`;
        }
    }

    function renderInventory(items) {
        const grid = document.getElementById("inventory-grid");
        grid.innerHTML = "";
        if (items.length === 0) {
            grid.innerHTML = `<div class="status-msg">No cigars found in this category.</div>`;
            return;
        }
        items.forEach(i => {
            const meta = i.details || {};
            const imgSrc = meta.image || 'https://thetobaccocenter.com/logo-placeholder.png';
            grid.innerHTML += `
                <div class="cigar-card">
                    <div class="img-box"><img src="${imgSrc}" loading="lazy"></div>
                    <div>
                        <div class="cigar-meta">${meta.strength || 'Medium'} · ${meta.vitola || 'Boutique'}</div>
                        <h3>${i.name}</h3>
                        <p>${meta.profile || 'A hand-curated boutique selection from our humidor.'}</p>
                    </div>
                </div>`;
        });
    }

    function applyFilter() {
        const val = document.getElementById("strengthFilter").value;
        renderInventory(val === "All" ? fullInventory : fullInventory.filter(i => (i.details?.strength || "Medium") === val));
    }

    loadInventory();
</script>

</body>
</html>
