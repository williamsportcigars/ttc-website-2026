<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Virtual Humidor | Diagnostic Mode</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --black: #001b16; --jungle: #022e27; --mint: #259f8a; --cream: #fdfcf8; }
        body { font-family: 'Josefin Sans', sans-serif; background: var(--cream); margin: 0; }
        .site-nav { background: var(--black); padding: 1rem 4rem; color: var(--mint); font-weight: bold; }
        .inventory-section { padding: 4rem; }
        #inventory-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 2rem; }
        .cigar-card { background: white; border: 1px solid #eee; padding: 1.5rem; display: flex; gap: 15px; }
        .img-box { width: 100px; height: 100px; background: #f9f9f9; flex-shrink: 0; border: 1px solid #eee; }
        .img-box img { width: 100%; height: 100%; object-fit: contain; }
        .debug-panel { font-size: 10px; background: #fffde7; padding: 10px; border: 1px solid #e1d800; margin-top: 10px; display: none; }
        .status-msg { text-align: center; padding: 5rem; font-style: italic; }
    </style>
</head>
<body>

<nav class="site-nav">The Tobacco Center (Diagnostic View)</nav>

<section class="inventory-section">
    <div id="inventory-grid"><div class="status-msg">Loading...</div></div>
</section>

<script>
    async function load() {
        const grid = document.getElementById("inventory-grid");
        const isDebug = new URLSearchParams(window.location.search).get('debug') === 'true';
        
        try {
            const res = await fetch("https://ttc-inv-api.williamsportcigars.workers.dev/?v=" + Date.now());
            const items = await res.json();
            
            if (items.error) {
                grid.innerHTML = `<div class="status-msg">Clover Error: ${items.error}</div>`;
                return;
            }

            grid.innerHTML = "";
            items.forEach(i => {
                const card = document.createElement('div');
                card.className = 'cigar-card';
                
                // Determine if we have data or empty strings
                const img = i.image || 'https://thetobaccocenter.com/logo-placeholder.png';
                const hasDesc = i.profile && i.profile !== "Hand-curated boutique selection.";

                card.innerHTML = `
                    <div class="img-box">
                        <img src="${img}" onerror="this.src='https://thetobaccocenter.com/logo-placeholder.png'">
                    </div>
                    <div>
                        <div style="font-size: 10px; color: var(--mint); font-weight: bold;">${i.strength}</div>
                        <h3 style="margin: 5px 0;">${i.name}</h3>
                        <p style="font-size: 13px; color: #666; margin: 0;">${i.profile}</p>
                        <div class="debug-panel" style="${isDebug ? 'display:block' : ''}">
                            <b>RAW DESC:</b> ${i._debug_raw?.desc || 'null'}<br>
                            <b>RAW ALT:</b> ${i._debug_raw?.alt || 'null'}<br>
                            <b>IMG FOUND:</b> ${i.image ? 'YES' : 'NO'}
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        } catch (e) {
            grid.innerHTML = `<div class="status-msg">Connection Failed: ${e.message}</div>`;
        }
    }
    load();
</script>
</body>
</html>
