<div id="inventory-grid">
    <p id="status-message" style="grid-column: 1/-1; text-align: center; padding: 50px; font-style: italic;">
        Opening the vault...
    </p>
</div>

<script>
    let inventory = [];

    // Clover prices are often in cents (1550 = $15.50). 
    // This handles both cents or standard decimals.
    function formatCurrency(price) {
        if (!price && price !== 0) return "TBD";
        const num = parseFloat(price);
        // If the price is a large integer (like 1500), treat as cents
        const finalPrice = num > 1000 ? num / 100 : num;
        return new Intl.NumberFormat('en-US', {
            style: 'currency',
            currency: 'USD',
        }).format(finalPrice);
    }

    async function fetchCigars() {
        const grid = document.getElementById('inventory-grid');
        const status = document.getElementById('status-message');

        try {
            // Added a cache-buster to ensure we get fresh data
            const res = await fetch('https://ttc-inv-api.williamsportcigars.workers.dev/?v=' + Date.now());
            
            if (!res.ok) throw new Error("Server responded with error " + res.status);
            
            const data = await res.json();
            console.log("TTC API Data Loaded:", data); // Check your browser console (F12)

            // Normalize data: Some APIs use 'meta', others use 'details'
            inventory = data.map(item => ({
                ...item,
                meta: item.meta || item.details || {},
                price: item.price || item.cost || 0
            }));

            // 3rd RULE SORTING
            inventory.sort((a, b) => {
                const isARule = a.name.toLowerCase().includes("3rd rule");
                const isBRule = b.name.toLowerCase().includes("3rd rule");
                if (isARule && !isBRule) return -1;
                if (!isARule && isBRule) return 1;
                return a.name.localeCompare(b.name);
            });

            renderGrid();
        } catch (err) {
            console.error("Fetch Error:", err);
            status.innerHTML = `
                <div style="color: #e74c3c;">
                    <strong>Vault Connection Error</strong><br>
                    <span style="font-size: 0.8rem; opacity: 0.7;">${err.message}</span><br>
                    <button onclick="location.reload()" style="margin-top:15px; padding: 5px 15px;">Retry Connection</button>
                </div>`;
        }
    }

    function renderGrid() {
        const filterValue = document.getElementById('strengthFilter').value;
        const grid = document.getElementById('inventory-grid');
        grid.innerHTML = '';

        const filtered = inventory.filter(i => filterValue === 'All' || i.strength === filterValue);

        if (filtered.length === 0) {
            grid.innerHTML = `<p style="grid-column: 1/-1; text-align: center; padding: 50px;">No cigars found in the "${filterValue}" category.</p>`;
            return;
        }

        filtered.forEach(item => {
            const card = document.createElement('div');
            card.className = 'cigar-card';
            card.onclick = () => card.classList.toggle('open');

            const strengthMap = { 'Mild': 1, 'Flavored': 2, 'Medium': 3, 'Full': 5 };
            let dotsHTML = '';
            for(let d=1; d<=5; d++) {
                const activeClass = d <= (strengthMap[item.strength] || 3) ? `active-${item.strength}` : '';
                dotsHTML += `<div class="dot ${activeClass}"></div>`;
            }

            card.innerHTML = `
                <div class="price-badge">${formatCurrency(item.price)}</div>
                <div class="img-container">
                    <img src="${item.meta.image || 'https://thetobaccocenter.com/logo-placeholder.png'}" 
                         onerror="this.src='https://thetobaccocenter.com/logo-placeholder.png'"
                         loading="lazy">
                </div>
                <div class="card-body">
                    <div class="dots">${dotsHTML}</div>
                    <div style="font-size: 10px; font-weight: 600; color: var(--mint); text-transform: uppercase;">${item.strength || 'Medium'}</div>
                    <h3 class="cigar-name">${item.name}</h3>
                    <div style="font-size: 11px; opacity: 0.6; text-transform: uppercase;">${item.meta.vitola || 'Hand-Rolled'}</div>
                </div>
                <div class="drawer">
                    <div class="drawer-inner">
                        <strong style="color: var(--black); display: block; margin-bottom: 5px;">Tasting Notes:</strong>
                        ${item.meta.profile || 'Hand-curated premium selection from our humidor.'}
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    fetchCigars();
</script>
