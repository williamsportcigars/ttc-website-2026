<!DOCTYPE html>
<html>
<head>
  <title>Virtual Humidor</title>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      margin: 0;
      padding: 20px;
    }

    h1 {
      margin-bottom: 10px;
    }

    button {
      padding: 10px 15px;
      margin-bottom: 15px;
      cursor: pointer;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    .card {
      background: #222;
      padding: 10px;
      border-radius: 10px;
    }

    img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 8px;
      background: #000;
    }

    .name {
      font-weight: bold;
      margin-top: 8px;
    }

    .price {
      color: #0f0;
    }

    .profile {
      font-size: 12px;
      opacity: 0.8;
    }
  </style>
</head>

<body>

<h1>Virtual Humidor</h1>

<button onclick="generateImages()">Generate Missing Images</button>

<div id="grid" class="grid"></div>

<script>
const API = "https://ttc-humidor.williamsportcigars.workers.dev";

async function loadItems() {
const res = await fetch("https://ttc-inv-api.williamsportcigars.workers.dev/");  const data = await res.json();

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  data.forEach(item => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${item.image || ''}" />
      <div class="name">${item.name}</div>
      <div class="price">$${item.price}</div>
      <div class="profile">${item.strength || ''}</div>
      <div class="profile">${item.profile || ''}</div>
    `;

    grid.appendChild(card);
  });
}

async function generateImages() {
  const res = await fetch(API + "/generate-images", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ password: "6116" })
  });

  const data = await res.json();
  console.log("Generated:", data);

  loadItems();
}

loadItems();
</script>

</body>
</html>
