<!DOCTYPE html>
<html>
<head>
    <title>Virtual Humidor | The Tobacco Center</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Josefin+Sans:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c9a84c; --jungle: #001b16; --forest: #033d33; }
        body { font-family: 'Josefin Sans', sans-serif; background: var(--jungle); color: #eee; padding: 20px; text-align: center; }
        h2 { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 2.8rem; margin: 40px 0 10px; }
        
        /* Filter Styling */
        .filter-box { margin-bottom: 30px; }
        select { padding: 12px 25px; border-radius: 50px; background: var(--forest); color: white; border: 1px solid var(--gold); outline: none; font-family: inherit; cursor: pointer; }

        #inventory { max-width: 800px; margin: 0 auto; display: grid; gap: 20px; min-height: 800px; }
        
        /* 🛑 GRID-LOCK: PREVENTS SHAKING */
        .item { 
            background: var(--forest); border-radius: 12px; border-left: 5px solid var(--gold); 
            display: grid; 
            grid-template-columns: 100px 1fr; /* Fixed pillar for image */
            gap: 20px; 
            padding: 20px; text-align: left; align-items: start; 
            min-height: 140px; /* Lock row height */
            box-sizing: border-box;
            overflow: hidden;
        }

        .img-box { 
            width: 100px; height: 100px; 
            background: white; border-radius: 8px; 
            overflow: hidden; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
        }
        .img-box img { width: 100%; height: 100%; object-fit: contain; display: block; }
        
        /* Strength Tags */
        .strength { display: inline-block; padding: 4px 10px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; margin-bottom: 8px; }
        .Mild { background: #f1c40f; color: #000; } 
        .Medium { background: #e67e22; color: #fff; } 
        .Full { background: #c0392b; color: #fff; } 
        .Flavored { background: #9b59b6; color: #fff; }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <h2>Virtual Humidor</h2>
    
    <div class="filter-box">
        <select id="strengthFilter" onchange="filterItems()">
            <option value="All">All Strengths</option>
            <option value="Mild">Mild</option>
            <option value="Medium">Medium</option>
            <option value="Full">Full</option>
            <option value="Flavored">Flavored</option>
        </select>
    </div>

    <div id="inventory">Loading Selection...</div>

    <script>
        let allItems = [];

        async function load() {
            try {
                const res = await fetch("https://ttc-inv-api.williamsportcigars.workers.dev/");
                allItems = await res.json();
                render(allItems);
            } catch (e) {
                document.getElementById("inventory").innerText = "Error loading inventory.";
            }
        }

        function render(items) {
            const container = document.getElementById("inventory");
            container.innerHTML = "";

            if (items.length === 0) {
                container.innerHTML = "<p>No items found in this category.</p>";
                return;
            }

            items.forEach(i => {
                const details = i.details || {};
                const strength = details.strength || 'Medium';
                
                container.innerHTML += `
                    <div class="item" data-strength="${strength}">
                        <div class="img-box">
                            <img src="${details.image || 'https://thetobaccocenter.com/logo-placeholder.png'}" loading="lazy">
                        </div>
                        <div class="details">
                            <span class="strength ${strength}">${strength}</span>
                            <div style="font-family:'Playfair Display'; color:var(--gold); font-size:1.4rem; font-weight:bold;">${i.name}</div>
                            <div style="font-size:0.9rem; color:#ccc; margin-top:5px;">${details.vitola || ''} ${details.wrapper ? '• ' + details.wrapper : ''}</div>
                            <div style="font-size:0.9rem; margin-top:8px; line-height:1.4; color:#eee;">${details.profile || 'Classic TTC Selection.'}</div>
                        </div>
                    </div>`;
            });
        }

        function filterItems() {
            const val = document.getElementById("strengthFilter").value;
            if (val === "All") {
                render(allItems);
            } else {
                const filtered = allItems.filter(i => (i.details?.strength || "Medium") === val);
                render(filtered);
            }
        }

        load();
    </script>
</body>
</html>
