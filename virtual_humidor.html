<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Humidor | The Tobacco Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --black: #001b16; --jungle: #022e27; --mint: #259f8a;
            --warm-white: #f7fffe; --yellow: #f1c40f; --green: #2ecc71;
            --red: #e74c3c; --blue: #3498db;
            --font-display: 'Playfair Display', serif;
            --font-sans: 'Josefin Sans', sans-serif;
        }
        body { font-family: var(--font-sans); background: var(--warm-white); color: var(--black); margin: 0; }
        .site-nav { background: var(--black); padding: 1rem 5%; position: sticky; top: 0; z-index: 100; height: 64px; display: flex; align-items: center; }
        .nav-logo { font-family: var(--font-display); color: var(--mint); text-decoration: none; font-weight: 700; text-transform: uppercase; font-size: 14px; }
        .inv-hero { background: var(--black); padding: 80px 5% 40px; color: white; }
        .inv-hero h1 { font-family: var(--font-display); font-size: clamp(2.2rem, 5vw, 4rem); margin: 0; }
        .inv-hero h1 em { color: var(--mint); font-style: italic; }
        .filter-wrap { background: var(--jungle); padding: 1.2rem 5%; display: flex; align-items: center; gap: 15px; border-bottom: 2px solid var(--mint); }
        select { background: white; color: black; border: none; padding: 8px 12px; border-radius: 4px; font-weight: 600; cursor: pointer; }
        #inventory-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem; padding: 4rem 5%; max-width: 1400px; margin: 0 auto; }
        .cigar-card { background: white; border: 1px solid #dcece9; border-radius: 4px; overflow: hidden; cursor: pointer; transition: 0.3s; position: relative; }
        .img-container { width: 100%; height: 200px; background: #fff; display: flex; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; border-bottom: 1px solid #f0f0f0; }
        .img-container img { max-height: 100%; max-width: 100%; object-fit: contain; }
        .card-body { padding: 1.5rem; }
        .cigar-name { font-family: var(--font-display); font-size: 1.3rem; margin: 10px 0; min-height: 3.2rem; }
        .dots { display: flex; gap: 5px; margin-bottom: 10px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #eee; }
        .dot.active-Mild { background: var(--yellow); }
        .dot.active-Flavored { background: var(--blue); }
        .dot.active-Medium { background: var(--green); }
        .dot.active-Full { background: var(--red); }
        .price-badge { position: absolute; top: 12px; right: 12px; background: var(--black); color: var(--mint); padding: 4px 10px; border-radius: 4px; font-weight: bold; font-size: 0.8rem; }
        .drawer { max-height: 0; overflow: hidden; transition: 0.4s ease-out; background: #fafafa; opacity: 0; }
        .cigar-card.open .drawer { max-height: 400px; opacity: 1; border-top: 1px dashed var(--mint); }
        .drawer-inner { padding: 1.5rem; font-size: 0.9rem; font-style: italic; color: #444; }
        footer { background: var(--black); color: rgba(255,255,255,0.4); text-align: center; padding: 3rem; font-size: 10px; }
    </style>
</head>
<body>

<nav class="site-nav"><a href="#" class="nav-logo">The Tobacco Center</a></nav>

<section class="inv-hero">
    <h1 style="font-family: var(--font-sans); font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--mint); margin-bottom: 10px;">Williamsport, PA</h1>
    <h1>The Virtual <em>Humidor.</em></h1>
</section>

<div class="filter-wrap">
    <select id="strengthFilter" onchange="renderGrid()">
        <option value="All">All Strengths</option>
        <option value="Mild">Mild</option>
        <option value="Flavored">Flavored</option>
        <option value="Medium">Medium</option>
        <option value="Full">Full</option>
    </select>
</div>

<div id="inventory-grid"></div>

<footer>© 2026 THE TOBACCO CENTER LLC</footer>

<script>
    let inventory = [];

    async function load() {
        try {
            const res = await fetch('https://ttc-inv-api.williamsportcigars.workers.dev/');
            inventory = await res.json();
            renderGrid();
        } catch (e) {
            console.error("Load failed", e);
        }
    }

    function renderGrid() {
        const filter = document.getElementById('strengthFilter').value;
        const grid = document.getElementById('inventory-grid');
        grid.innerHTML = '';

        inventory.filter(i => filter === 'All' || i.details.strength === filter).forEach(item => {
            const card = document.createElement('div');
            card.className = 'cigar-card';
            card.onclick = () => card.classList.toggle('open');
            
            const currentStrength = item.details.strength;
            const dotsMap = { 'Mild': 1, 'Flavored': 2, 'Medium': 3, 'Full': 5 };
            let dots = '';
            for(let d=1; d<=5; d++) {
                const active = d <= (dotsMap[currentStrength] || 3) ? `active-${currentStrength}` : '';
                dots += `<div class="dot ${active}"></div>`;
            }

            card.innerHTML = `
                <div class="price-badge">$${(item.price / 100).toFixed(2)}</div>
                <div class="img-container">
                    <img src="${item.details.image || 'https://thetobaccocenter.com/logo-placeholder.png'}" 
                         onerror="this.src='https://thetobaccocenter.com/logo-placeholder.png'">
                </div>
                <div class="card-body">
                    <div class="dots">${dots}</div>
                    <div style="font-size: 10px; font-weight: 600; color: var(--mint); text-transform: uppercase;">${currentStrength}</div>
                    <h3 class="cigar-name">${item.name}</h3>
                </div>
                <div class="drawer"><div class="drawer-inner">${item.details.profile}</div></div>
            `;
            grid.appendChild(card);
        });
    }
    load();
</script>
</body>
</html>
