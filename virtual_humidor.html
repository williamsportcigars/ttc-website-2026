<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Humidor | The Tobacco Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Libre+Baskerville:ital,wght@0,400;1,400&family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --black: #001b16; --forest: #033d33; --jungle: #022e27;
            --mint: #259f8a; --gold: #c9a84c; --cream: #f0fdf8;
            --warm-white: #f7fffe; --text: #001b16; --border: #9dd4c8;
            --font-display: 'Playfair Display', serif;
            --font-body: 'Libre Baskerville', serif;
            --font-sans: 'Josefin Sans', sans-serif;
        }
        body { font-family: var(--font-body); background: var(--warm-white); color: var(--text); margin: 0; }
        .site-nav { background: var(--black); height: 64px; display: flex; align-items: center; padding: 0 2rem; position: sticky; top: 0; z-index: 100; }
        .nav-logo { font-family: var(--font-display); color: var(--mint); text-decoration: none; font-weight: 700; text-transform: uppercase; font-size: 15px; }
        
        .inv-hero { background: var(--black); padding: 80px 4rem; color: white; border-bottom: 1px solid var(--mint); }
        .inv-hero h1 { font-family: var(--font-display); font-size: clamp(3rem, 6vw, 5rem); margin: 0; }
        .inv-hero h1 em { color: var(--mint); font-style: italic; }

        .filter-wrap { background: var(--forest); padding: 1.5rem 4rem; display: flex; align-items: center; gap: 20px; }
        select { background: white; color: black; border: 2px solid var(--mint); padding: 8px 16px; border-radius: 2px; font-family: var(--font-sans); font-weight: 600; cursor: pointer; }

        .inventory-section { padding: 4rem; background: var(--cream); }
        #inventory-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 1.5rem; max-width: 1400px; margin: 0 auto; }
        
        .cigar-card { background: white; border: 1px solid var(--border); padding: 1.5rem; display: grid; grid-template-columns: 100px 1fr; gap: 1.25rem; position: relative; }
        .img-box { width: 100px; height: 100px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); overflow: hidden; }
        .img-box img { width: 100%; height: 100%; object-fit: contain; }

        /* DOT SYSTEM */
        .dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .dot-Flavored { background: #3498db; } /* Blue */
        .dot-Mild { background: #f1c40f; }     /* Yellow */
        .dot-Medium { background: #2ecc71; }   /* Green */
        .dot-Full { background: #e74c3c; }     /* Red */

        .cigar-strength { font-family: var(--font-sans); font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--mint); margin-bottom: 4px; }
        .cigar-name { font-family: var(--font-display); font-weight: 700; font-size: 1.1rem; margin-bottom: 6px; }
        .cigar-profile { font-size: 0.8rem; line-height: 1.6; color: #444; margin-bottom: 8px; }
        .cigar-price { font-family: var(--font-sans); font-weight: 600; color: var(--gold); }
        
        .status-msg { grid-column: 1/-1; text-align: center; padding: 5rem; font-style: italic; color: var(--jungle); }
        .site-footer { background: var(--black); padding: 2rem 4rem; color: rgba(255,255,255,0.2); font-size: 10px; text-align: center; }
    </style>
</head>
<body>

<nav class="site-nav"><a href="#" class="nav-logo">The Tobacco Center</a></nav>

<section class="inv-hero">
    <h1>The Virtual <em>Humidor.</em></h1>
</section>

<div class="filter-wrap">
    <label style="color: white; font-family: var(--font-sans); font-size: 10px; text-transform: uppercase;">Filter Strength:</label>
    <select id="strengthFilter" onchange="applyFilter()">
        <option value="All">All Selections</option>
        <option value="Mild">Mild</option>
        <option value="Medium">Medium</option>
        <option value="Full">Full</option>
        <option value="Flavored">Flavored</option>
    </select>
    <div id="result-count" style="margin-left: auto; color: rgba(255,255,255,0.4); font-size: 10px;"></div>
</div>

<section class="inventory-section">
    <div id="inventory-grid"><div class="status-msg">Opening the humidor doors...</div></div>
</section>

<footer class="site-footer">© 2026 THE TOBACCO CENTER LLC</footer>

<script>
    var fullInventory = [];

    async function loadInventory() {
        var grid = document.getElementById('inventory-grid');
        try {
            var res = await fetch('https://ttc-humidor.williamsportcigars.workers.dev/');
            fullInventory = await res.json();
            renderInventory(fullInventory);
        } catch(e) {
            grid.innerHTML = '<div class="status-msg">Vault offline.</div>';
        }
    }

    function renderInventory(items) {
        var grid = document.getElementById('inventory-grid');
        var cnt = document.getElementById('result-count');
        cnt.textContent = items.length + ' cigars in stock';

        if (!items.length) { 
            grid.innerHTML = '<div class="status-msg">No cigars found in this category.</div>'; 
            return; 
        }

        grid.innerHTML = items.map(function(i) {
            var d = i.details || {};
            var strength = d.strength || 'Medium';
            var dotClass = 'dot-' + strength;
            
            var imgUrl = d.image || 'https://thetobaccocenter.com/logo-placeholder.png';

            return '<div class="cigar-card">' +
                '<div class="img-box"><img src="' + imgUrl + '" onerror="this.src=\'https://thetobaccocenter.com/logo-placeholder.png\'"></div>' +
                '<div class="card-body">' +
                    '<div class="cigar-strength"><span class="dot ' + dotClass + '"></span>' + strength + '</div>' +
                    '<div class="cigar-name">' + i.name + '</div>' +
                    '<div class="cigar-profile">' + (d.profile || '') + '</div>' +
                    '<div class="cigar-price">$' + i.price.toFixed(2) + '</div>' +
                '</div></div>';
        }).join('');
    }

    function applyFilter() {
        var val = document.getElementById('strengthFilter').value;
        renderInventory(val === 'All' ? fullInventory : fullInventory.filter(function(i) {
            return (i.details?.strength || 'Medium') === val;
        }));
    }

    loadInventory();
</script>
</body>
</html>
