<!DOCTYPE html>
<html>
<head>
    <title>Virtual Humidor | The Tobacco Center</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Josefin+Sans:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c9a84c; --jungle: #001b16; --forest: #033d33; }
        body { font-family: 'Josefin Sans', sans-serif; background: var(--jungle); color: #eee; padding: 20px; text-align: center; }
        h2 { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 2.8rem; margin: 40px 0 10px; }
        
        /* Filter Container - Stays at top */
        #filter-area { margin-bottom: 30px; }
        select { 
            padding: 12px 25px; border-radius: 50px; background: var(--forest); 
            color: white; border: 1px solid var(--gold); outline: none; 
            font-family: inherit; cursor: pointer; min-width: 200px;
        }

        #inventory-list { max-width: 800px; margin: 0 auto; display: grid; gap: 20px; min-height: 100vh; }
        
        /* 🛑 GRID-LOCK: ABSOLUTE SHAKE PREVENTION */
        .item { 
            background: var(--forest); border-radius: 12px; border-left: 5px solid var(--gold); 
            display: grid; 
            grid-template-columns: 100px 1fr; /* Rigid pillar for image */
            gap: 25px; 
            padding: 20px; text-align: left; align-items: start; 
            min-height: 140px; 
            box-sizing: border-box;
            overflow: hidden;
        }

        .img-box { 
            width: 100px; height: 100px; 
            background: #fff; border-radius: 8px; 
            overflow: hidden; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
        }
        .img-box img { width: 100px; height: 100px; object-fit: contain; display: block; }
        
        .strength { display: inline-block; padding: 4px 10px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; margin-bottom: 8px; }
        .Mild { background: #f1c40f; color: #000; } 
        .Medium { background: #e67e22; color: #fff; } 
        .Full { background: #c0392b; color: #fff; } 
        .Flavored { background: #9b59b6; color: #fff; }
    </style>
</head>
<body>

    <h2>Virtual Humidor</h2>

    <div id="filter-area">
        <select id="strengthFilter" onchange="applyFilter()">
            <option value="All">All Strengths</option>
            <option value="Mild">Mild</option>
            <option value="Medium">Medium</option>
            <option value="Full">Full</option>
            <option value="Flavored">Flavored</option>
        </select>
    </div>

    <div id="inventory-list">Loading Collection...</div>

    <script>
        let fullInventory = [];

        async function loadInventory() {
            try {
                const res = await fetch("https://ttc-inv-api.williamsportcigars.workers.dev/");
                fullInventory = await res.json();
                renderInventory(fullInventory);
            } catch (e) {
                document.getElementById("inventory-list").innerText = "Connection lost.";
            }
        }

        function renderInventory(items) {
            const list = document.getElementById("inventory-list");
            list.innerHTML = "";

            if (items.length === 0) {
                list.innerHTML = "<p>No matching cigars found.</p>";
                return;
            }

            items.forEach(i => {
                const meta = i.details || {};
                const str = meta.strength || 'Medium';
                
                list.innerHTML += `
                    <div class="item">
                        <div class="img-box">
                            <img src="${meta.image || 'https://thetobaccocenter.com/logo-placeholder.png'}" alt="${i.name}">
                        </div>
                        <div class="text-content">
                            <span class="strength ${str}">${str}</span>
                            <div style="font-family:'Playfair Display'; color:var(--gold); font-size:1.4rem; font-weight:bold;">${i.name}</div>
                            <div style="font-size:0.9rem; color:#ccc; margin: 4px 0;">${meta.vitola || ''} ${meta.wrapper ? '• ' + meta.wrapper : ''}</div>
                            <div style="font-size:0.9rem; line-height:1.4; color:#eee; margin-top:8px;">${meta.profile || 'Classic TTC Selection.'}</div>
                        </div>
                    </div>`;
            });
        }

        function applyFilter() {
            const selected = document.getElementById("strengthFilter").value;
            if (selected === "All") {
                renderInventory(fullInventory);
            } else {
                const filtered = fullInventory.filter(item => (item.details?.strength || "Medium") === selected);
                renderInventory(filtered);
            }
        }

        // Initialize on load
        loadInventory();
    </script>
</body>
</html>
