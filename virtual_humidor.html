<!DOCTYPE html>
<html>
<head>
    <title>Virtual Humidor | The Tobacco Center</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Josefin+Sans:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c9a84c; --jungle: #001b16; --forest: #033d33; }
        body { font-family: 'Josefin Sans', sans-serif; background: var(--jungle); color: #eee; padding: 20px; text-align: center; }
        h2 { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 2.5rem; margin-top: 40px; }
        
        input { padding: 15px; font-size: 18px; width: 100%; max-width: 320px; border-radius: 50px; border: 1px solid var(--gold); background: #052621; color: white; text-align: center; outline: none; box-sizing: border-box; }
        button { padding: 15px; border-radius: 50px; border: none; background: var(--gold); color: var(--jungle); font-weight: bold; cursor: pointer; margin-top: 15px; width: 100%; max-width: 320px; }

        /* 🛑 THE SHAKE KILLER: FIXED GRID + ASPECT RATIO */
        #results { max-width: 650px; margin: 40px auto; text-align: left; min-height: 400px; }
        
        .item { 
            background: var(--forest); 
            padding: 20px; 
            border-radius: 12px; 
            margin-bottom: 15px; 
            border-left: 5px solid var(--gold); 
            display: grid;
            grid-template-columns: 80px 1fr; /* Rigid 80px column for image */
            gap: 20px; 
            align-items: center;
            min-height: 120px; /* Lock row height to prevent vertical pop */
            box-sizing: border-box;
            overflow: hidden;
        }

        /* Pre-defined image box that stays 80x80 even if empty */
        .img-box { 
            width: 80px; 
            height: 80px; 
            background: rgba(255,255,255,0.05); 
            border-radius: 8px; 
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .img-box img { 
            width: 80px; 
            height: 80px; 
            object-fit: contain; 
            display: block;
        }

        .details-box { display: flex; flex-direction: column; }
    </style>
</head>
<body>
    <h2>Virtual Humidor</h2>
    <p style="margin-bottom:25px; font-weight:300;">Track your personal smoking history.</p>
    
    <input id="phone" type="tel" placeholder="(XXX) XXX-XXXX" /> <br>
    <button onclick="lookup()">Unlock Vault</button>

    <div id="results"></div>

    <script>
        const API_URL = "https://ttc-inv-api.williamsportcigars.workers.dev/customer-lookup";

        // Phone Formatting logic
        document.getElementById("phone").addEventListener("input", e => {
            let x = e.target.value.replace(/\D/g, "").slice(0, 10);
            e.target.value = x.length > 6 ? `(${x.slice(0,3)}) ${x.slice(3,6)}-${x.slice(6)}` : x.length > 3 ? `(${x.slice(0,3)}) ${x.slice(3)}` : x;
        });

        async function lookup() {
            const phone = document.getElementById("phone").value.replace(/\D/g, "").slice(-10);
            const container = document.getElementById("results");
            if(phone.length < 10) return;

            // Static placeholder message that doesn't move the layout
            container.innerHTML = "<p style='text-align:center; color:var(--gold);'>Opening Vault...</p>";

            try {
                const res = await fetch(API_URL, { 
                    method: "POST", 
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ phone }) 
                });
                const data = await res.json();

                if (!data.items || data.items.length === 0) {
                    container.innerHTML = "<p style='text-align:center;'>No history found. Purchases made at the shop will appear here.</p>";
                    return;
                }

                container.innerHTML = "";
                data.items.forEach(item => {
                    // Use logo-placeholder.png if the meta image is missing
                    const finalImg = item.meta?.image || 'https://thetobaccocenter.com/logo-placeholder.png';
                    
                    container.innerHTML += `
                        <div class="item">
                            <div class="img-box">
                                <img src="${finalImg}" alt="Cigar Image">
                            </div>
                            <div class="details-box">
                                <div style="font-family:'Playfair Display'; color:var(--gold); font-size:1.2rem; font-weight:bold; margin-bottom:2px;">${item.name}</div>
                                <div style="font-size:0.8rem; color:#259f8a; margin-bottom:5px;">Last Purchased: ${item.date}</div>
                                <div style="font-size:0.85rem; color:#ccc; line-height:1.3;">${item.meta?.profile || "Classic Selection."}</div>
                            </div>
                        </div>`;
                });
            } catch (e) {
                container.innerHTML = "<p style='text-align:center;'>Vault currently unavailable.</p>";
            }
        }
    </script>
</body>
</html>
