<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Humidor | The Tobacco Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --black: #001b16; --jungle: #022e27; --mint: #259f8a;
            --warm-white: #f7fffe; --yellow: #f1c40f; --green: #2ecc71;
            --red: #e74c3c; --blue: #3498db;
            --font-display: 'Playfair Display', serif;
            --font-sans: 'Josefin Sans', sans-serif;
        }

        /* --- Age Gate Overlay --- */
        #age-gate {
            position: fixed; inset: 0; background: var(--black); z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; font-family: var(--font-sans); text-align: center; padding: 20px;
        }

        body { background: #f0fdf8; color: var(--black); font-family: var(--font-sans); margin: 0; overflow-x: hidden; }

        /* --- Navigation & Hero --- */
        .site-nav { background: var(--black); padding: 1rem 5%; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--jungle); }
        .inv-hero { background: var(--black); padding: 80px 5% 40px; color: white; }
        .inv-hero h1 { font-family: var(--font-display); font-size: clamp(2.2rem, 6vw, 4rem); margin: 0; line-height: 1; }
        .inv-hero em { color: var(--mint); font-style: italic; }

        /* --- Filter Bar --- */
        .filter-wrap { background: var(--jungle); padding: 1.2rem 5%; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid var(--mint); }
        .filter-wrap label { color: white; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; }
        select { background: white; color: black; border: none; padding: 8px 12px; border-radius: 4px; font-family: var(--font-sans); font-weight: 600; cursor: pointer; }

        /* --- Inventory Grid (Anti-Shake) --- */
        #inventory-grid {
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 2.5rem; padding: 4rem 5%; max-width: 1400px; margin: 0 auto;
        }

        .cigar-card { 
            background: white; border: 1px solid #dcece9; border-radius: 4px; 
            overflow: hidden; cursor: pointer; transition: transform 0.3s ease; position: relative;
            display: flex; flex-direction: column;
        }

        .price-badge {
            position: absolute; top: 12px; right: 12px;
            background: var(--black); color: var(--mint);
            padding: 5px 12px; border-radius: 3px; font-weight: 600; font-size: 0.85rem;
            z-index: 5; border: 1px solid var(--mint);
        }

        .img-container { height: 200px; width: 100%; display: flex; align-items: center; justify-content: center; background: #fff; padding: 20px; box-sizing: border-box; }
        .img-container img { max-height: 100%; width: auto; object-fit: contain; }

        .card-body { padding: 1.5rem; flex-grow: 1; border-top: 1px solid #f0f0f0; }
        .cigar-name { font-family: var(--font-display); font-size: 1.4rem; margin: 8px 0; color: var(--black); min-height: 3.4rem; }

        /* --- Strength Meter --- */
        .dots { display: flex; gap: 4px; margin-bottom: 10px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #eee; }
        .dot.active-Mild { background: var(--yellow); }
        .dot.active-Flavored { background: var(--blue); }
        .dot.active-Medium { background: var(--green); }
        .dot.active-Full { background: var(--red); }

        /* --- Mobile Drawer --- */
        .drawer { max-height: 0; overflow: hidden; transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1); background: #fafafa; }
        .cigar-card.open { transform: translateY(-5px); box-shadow: 0 12px 30px rgba(0,27,22,0.1); border-color: var(--mint); }
        .cigar-card.open .drawer { max-height: 400px; }
        .drawer-inner { padding: 1.5rem; font-size: 0.95rem; line-height: 1.6; color: #444; border-top: 1px solid #eee; }

        footer { background: var(--black); color: rgba(255,255,255,0.4); text-align: center; padding: 4rem 1rem; font-size: 0.75rem; line-height: 1.8; }
        .loading-text { grid-column: 1/-1; text-align: center; padding: 100px; font-family: var(--font-display); font-style: italic; font-size: 1.5rem; color: var(--jungle); }
    </style>
</head>
<body>

<div id="age-gate">
    <h1 style="font-family: var(--font-display); font-size: 2.5rem; margin-bottom: 10px;">THE TOBACCO CENTER</h1>
    <p style="margin-bottom: 30px; opacity: 0.8; letter-spacing: 1px;">PREMIUM CIGAR LOUNGE & HUMIDOR</p>
    <button onclick="document.getElementById('age-gate').remove()" style="background: var(--mint); border: none; padding: 18px 50px; font-family: var(--font-sans); font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; color: var(--black);">I Am 21+</button>
</div>

<nav class="site-nav"><div style="color: var(--mint); font-family: var(--font-display); font-size: 1.4rem; font-weight: bold;">TTC</div></nav>

<section class="inv-hero">
    <span style="color: var(--mint); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 3px; display: block; margin-bottom: 10px;">Williamsport, PA</span>
    <h1>The Virtual <em>Humidor.</em></h1>
</section>

<div class="filter-wrap">
    <label for="strengthFilter">Browse Selection:</label>
    <select id="strengthFilter">
        <option value="All">All Inventory</option>
        <option value="Mild">Mild</option>
        <option value="Flavored">Flavored</option>
        <option value="Medium">Medium</option>
        <option value="Full">Full</option>
    </select>
</div>

<div id="inventory-grid">
    <div class="loading-text">Opening the vault...</div>
</div>

<footer>
    © 2026 THE TOBACCO CENTER LLC<br>
    Williamsport, PA · PREMIUM BOUTIQUE SELECTION
</footer>

<script>
    let inventoryData = [];

    function fixUrl(url) {
        if (!url) return 'https://thetobaccocenter.com/logo-placeholder.png';
        return url.replace('http://', 'https://');
    }

    function formatPrice(val) {
        if (!val) return "$--";
        const price = val > 1000 ? val / 100 : val;
        return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(price);
    }

    function renderGrid() {
        const grid = document.getElementById('inventory-grid');
        const filterValue = document.getElementById('strengthFilter').value;
        if (!grid) return;
        grid.innerHTML = '';

        const processed = inventoryData.map(item => {
            const meta = item.meta || item.details || {};
            let s = item.strength || meta.strength;
            // Force 3rd Rule to Full if data is missing
            if (item.name.toLowerCase().includes("3rd rule") && (!s || s === "Medium")) s = "Full";
            if (!s) s = "Medium";
            return { ...item, finalStrength: s };
        });

        const filtered = processed.filter(i => filterValue === 'All' || i.finalStrength === filterValue);

        filtered.forEach(item => {
            const meta = item.meta || item.details || {};
            const card = document.createElement('div');
            card.className = 'cigar-card';
            card.onclick = () => card.classList.toggle('open');

            const strengthMap = { 'Mild': 1, 'Flavored': 2, 'Medium': 3, 'Full': 5 };
            let dots = '';
            for(let d=1; d<=5; d++) {
                const active = d <= (strengthMap[item.finalStrength] || 3) ? `active-${item.finalStrength}` : '';
                dots += `<div class="dot ${active}"></div>`;
            }

            card.innerHTML = `
                <div class="price-badge">${formatPrice(item.price || item.cost)}</div>
                <div class="img-container">
                    <img src="${fixUrl(meta.image)}" onerror="this.src='https://thetobaccocenter.com/logo-placeholder.png'">
                </div>
                <div class="card-body">
                    <div class="dots">${dots}</div>
                    <div style="font-size: 10px; font-weight: 600; color: var(--mint); text-transform: uppercase;">${item.finalStrength}</div>
                    <h3 class="cigar-name">${item.name}</h3>
                    <div style="font-size: 11px; opacity: 0.5; text-transform: uppercase;">${meta.vitola || 'Boutique'}</div>
                </div>
                <div class="drawer">
                    <div class="drawer-inner">
                        <strong style="color: var(--mint); display: block; margin-bottom: 8px; font-size: 0.8rem; text-transform: uppercase;">Tasting Profile</strong>
                        ${meta.profile || 'Hand-curated premium selection.'}
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    async function init() {
        const filterElem = document.getElementById('strengthFilter');
        if (filterElem) filterElem.addEventListener('change', renderGrid);

        try {
            const response = await fetch('https://ttc-inv-api.williamsportcigars.workers.dev/');
            const data = await response.json();
            
            // Priority Sort: 3rd Rule at top, then Alphabetical
            inventoryData = data.sort((a, b) => {
                const aRule = a.name.toLowerCase().includes("3rd rule");
                const bRule = b.name.toLowerCase().includes("3rd rule");
                if (aRule && !bRule) return -1;
                if (!aRule && bRule) return 1;
                return a.name.localeCompare(b.name);
            });
            renderGrid();
        } catch (err) {
            document.getElementById('inventory-grid').innerHTML = `<div class="loading-text">Vault Locked. Please refresh.</div>`;
        }
    }

    window.onload = init;
</script>
</body>
</html>
