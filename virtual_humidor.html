<!DOCTYPE html>
<html>
<head>
  <title>Humidor</title>
  <style>
    body { font-family: Arial; background:#111; color:#fff; }
    .grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
    .card { background:#222; padding:10px; border-radius:10px; }
    img { width:100%; height:200px; object-fit:cover; border-radius:8px; }
  </style>
</head>
<body>

<h1>Humidor</h1>
<button onclick="gen()">Generate Images</button>

<div id="grid" class="grid"></div>

<script>
const API = "https://ttc-humidor.williamsportcigars.workers.dev";

async function load() {
  const res = await fetch(API + "/api/items");
  const data = await res.json();

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  data.forEach(item => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${item.image || ''}" />
      <h3>${item.name}</h3>
      <p>$${item.price}</p>
      <p>${item.strength}</p>
      <p>${item.profile}</p>
    `;

    grid.appendChild(div);
  });
}

async function gen() {
  const res = await fetch(API + "/generate-images", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ password: "6116" })
  });

  console.log(await res.json());
  load();
}

load();
</script>

</body>
</html>
