<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Tobacco Center | Boutique Cigar Lounge | Williamsport, PA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --jungle: #29ab87; /* Lush Jungle Green */
            --mint: #98fb98;   /* Refreshing Mint Green */
            --dark-jungle: #1a2421; /* Deep Dark Base */
            --brass: #c9a84c;  /* Brass/Gold Accent */
            --text: #f4f4f4;
        }

        body {
            background-color: var(--dark-jungle);
            color: var(--text);
            font-family: 'Garamond', serif;
            margin: 0;
            line-height: 1.6;
        }

        nav {
            background: rgba(26, 36, 33, 0.95);
            padding: 1rem;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 3px solid var(--jungle);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav ul { list-style: none; display: flex; margin: 0; }
        nav ul li { margin-left: 20px; }
        nav a { color: var(--mint); text-decoration: none; text-transform: uppercase; font-weight: bold; font-size: 0.9rem; }
        nav a:hover { color: var(--brass); }

        .hero {
            padding: 120px 20px;
            text-align: center;
            /* Jungle green gradient overlay over a tobacco-themed background */
            background: linear-gradient(rgba(26, 36, 33, 0.8), rgba(41, 171, 135, 0.6)), 
                        url('https://images.unsplash.com/photo-1513106580661-8d234c06208a?auto=format&fit=crop&q=80');
            background-size: cover;
            background-position: center;
            border-bottom: 5px solid var(--brass);
        }

        .hero h1 { font-size: 4rem; color: var(--mint); margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .hero p { font-style: italic; font-size: 1.4rem; color: var(--text); }

        .section { padding: 80px 20px; max-width: 1100px; margin: auto; }
        h2 { color: var(--jungle); border-bottom: 2px solid var(--mint); padding-bottom: 10px; margin-bottom: 30px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .card { 
            background: #23352e; 
            padding: 30px; 
            border-radius: 8px; 
            border-top: 4px solid var(--jungle);
            transition: transform 0.3s ease;
        }
        .card:hover { transform: translateY(-5px); border-top: 4px solid var(--mint); }
        .card h3 { color: var(--mint); margin-top: 0; }

        .btn {
            display: inline-block;
            background: var(--jungle);
            color: white;
            padding: 14px 28px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 25px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn:hover { background: var(--mint); color: var(--dark-jungle); }

        /* Age Verification Overlay */
        #age-gate {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--dark-jungle); z-index: 9999; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            text-align: center; border: 15px solid var(--jungle);
        }
        #age-gate h1 { color: var(--mint); font-size: 3rem; }

        footer { 
            text-align: center; 
            padding: 50px; 
            font-size: 0.9rem; 
            border-top: 1px solid var(--jungle); 
            background: #151d1a;
            color: var(--mint);
        }
    </style>
</head>
<body>

    <div id="age-gate">
        <h1>THE TOBACCO CENTER</h1>
        <p>YOU MUST BE 21 OR OLDER TO ENTER</p>
        <div>
            <button class="btn" onclick="document.getElementById('age-gate').style.display='none'">YES, I AM 21+</button>
            <a href="https://google.com" class="btn" style="background: transparent; border: 1px solid var(--mint);">NO, EXIT</a>
        </div>
    </div>

    <nav>
        <div style="font-weight: bold; color: var(--mint); font-size: 1.5rem;">TTC</div>
        <ul>
            <li><a href="#home">Home</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#events">Events</a></li>
            <li><a href="/my-humidor" style="color: var(--brass);">Member Portal
